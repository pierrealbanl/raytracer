# Sunset scene - spheres as sun + landscape
camera:
{
    resolution = { width = 1920, height = 1080 }
    position = { x = 0, y = -200, z = 20 }
    fieldOfView = 80.0
};

primitives:
{
    spheres = (
        # Soleil couchant (enorme, en arriere plan)
        { x = 0, y = 500, z = 60, r = 150, material = { flatColor = {r = 255, g = 80, b = 20} } },
        # Colline gauche
        { x = -120, y = 100, z = -80, r = 70, material = { flatColor = {r = 40, g = 60, b = 30} } },
        # Colline droite
        { x = 100, y = 150, z = -90, r = 80, material = { flatColor = {r = 35, g = 55, b = 25} } },
        # Arbre 1 (tronc = sphere aplatie)
        { x = -40, y = 50, z = -15, r = 5, material = { flatColor = {r = 80, g = 50, b = 20} } },
        # Arbre 1 (feuillage)
        { x = -40, y = 50, z = 5, r = 15, material = { flatColor = {r = 30, g = 80, b = 20} } },
        # Arbre 2
        { x = 30, y = 70, z = -15, r = 5, material = { flatColor = {r = 80, g = 50, b = 20} } },
        { x = 30, y = 70, z = 8, r = 18, material = { flatColor = {r = 25, g = 70, b = 15} } }
    );

    planes = (
        # Sol (terre/herbe sombre)
        { x = 0, y = 0, z = -30, material = { flatColor = {r = 50, g = 70, b = 35} } }
    );
};

lights:
{
    ambient = (
        {intensity = 0.35}
    );
    directionnal = (
        {x = 0, y = 1, z = -1, intensity = 0.65}
    );
};
