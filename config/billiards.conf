{
    spheres = (
        # Rangee 1 (avant)
        { x = 0, y = 30, z = 0, r = 10, material = { flatColor = {r = 255, g = 255, b = 0} } },
        # Rangee 2
        { x = -11, y = 50, z = 0, r = 10, material = { flatColor = {r = 0, g = 0, b = 200} } },
        { x = 11, y = 50, z = 0, r = 10, material = { flatColor = {r = 200, g = 0, b = 0} } },
        # Rangee 3
        { x = -22, y = 70, z = 0, r = 10, material = { flatColor = {r = 128, g = 0, b = 128} } },
        { x = 0, y = 70, z = 0, r = 10, material = { flatColor = {r = 20, g = 20, b = 20} } },
        { x = 22, y = 70, z = 0, r = 10, material = { flatColor = {r = 255, g = 140, b = 0} } },
        # Rangee 4
        { x = -33, y = 90, z = 0, r = 10, material = { flatColor = {r = 0, g = 100, b = 0} } },
        { x = -11, y = 90, z = 0, r = 10, material = { flatColor = {r = 139, g = 69, b = 19} } },
        { x = 11, y = 90, z = 0, r = 10, material = { flatColor = {r = 0, g = 150, b = 150} } },
        { x = 33, y = 90, z = 0, r = 10, material = { flatColor = {r = 180, g = 0, b = 50} } },
        # Boule blanche
        { x = 0, y = -40, z = 0, r = 10, material = { flatColor = {r = 250, g = 250, b = 250} } }
    );

    planes = (
        # Tapis vert
        { x = 0, y = 0, z = -10, material = { flatColor = {r = 0, g = 100, b = 50} } }
    );
};

lights:
{
    ambient = (
        {intensity = 0.3}
    );
    directionnal = (
        {x = 0, y = 0, z = -1, intensity = 0.7}
    );
};
