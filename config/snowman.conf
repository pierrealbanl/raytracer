# Snowman on a blue ground
camera:
{
    resolution = { width = 1920, height = 1080 }
    position = { x = 0, y = -150, z = 40 }
    fieldOfView = 60.0
};

primitives:
{
    spheres = (
        # Corps bas
        { x = 0, y = 0, z = -5, r = 40, material = { flatColor = {r = 240, g = 240, b = 255} } },
        # Corps milieu
        { x = 0, y = 0, z = 45, r = 30, material = { flatColor = {r = 245, g = 245, b = 255} } },
        # Tete
        { x = 0, y = 0, z = 82, r = 20, material = { flatColor = {r = 250, g = 250, b = 255} } },
        # Oeil gauche
        { x = -7, y = -15, z = 88, r = 3, material = { flatColor = {r = 20, g = 20, b = 20} } },
        # Oeil droit
        { x = 7, y = -15, z = 88, r = 3, material = { flatColor = {r = 20, g = 20, b = 20} } },
        # Nez (carotte)
        { x = 0, y = -20, z = 82, r = 4, material = { flatColor = {r = 255, g = 120, b = 0} } },
        # Bouton haut
        { x = 0, y = -28, z = 50, r = 3, material = { flatColor = {r = 30, g = 30, b = 30} } },
        # Bouton bas
        { x = 0, y = -30, z = 38, r = 3, material = { flatColor = {r = 30, g = 30, b = 30} } }
    );

    planes = (
        # Sol enneige
        { x = 0, y = 0, z = -45, material = { flatColor = {r = 200, g = 220, b = 255} } }
    );
};

lights:
{
    ambient = (
        {intensity = 0.3}
    );
    directionnal = (
        {x = 1, y = -1, z = -1, intensity = 0.7}
    );
};
